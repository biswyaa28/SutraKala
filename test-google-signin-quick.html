<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Google Sign-In Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 1rem; font-size: 2rem; }
        p { color: #666; margin-bottom: 2rem; line-height: 1.6; }
        .btn {
            background: #764ba2;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 600;
        }
        .btn:hover {
            background: #5e3886;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(118, 75, 162, 0.4);
        }
        .btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 8px;
            display: none;
            text-align: left;
        }
        .result.show { display: block; }
        .result.success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }
        .result.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }
        .result h3 {
            margin-bottom: 0.75rem;
            font-size: 1.25rem;
        }
        .result pre {
            background: rgba(0,0,0,0.05);
            padding: 0.75rem;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        .links {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #e0e0e0;
        }
        .links a {
            color: #764ba2;
            text-decoration: none;
            font-weight: 600;
            display: block;
            margin: 0.5rem 0;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .icon {
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Quick Test</h1>
        <p>Click the button below to test Google Sign-In. We'll show you exactly what happens.</p>
        
        <button class="btn" id="signInBtn">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Sign in with Google</span>
        </button>
        
        <div id="result" class="result"></div>
        
        <div class="links">
            <a href="diagnose-google-signin.html">🔍 Run Full Diagnostics</a>
            <a href="GOOGLE_SIGNIN_FIX.md" target="_blank">📖 View Fix Guide</a>
            <a href="login.html">🔑 Go to Login Page</a>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        
        const btn = document.getElementById('signInBtn');
        const resultEl = document.getElementById('result');
        
        function showResult(type, title, message, details = null) {
            resultEl.className = `result show ${type}`;
            resultEl.innerHTML = `
                <h3>${title}</h3>
                <p>${message}</p>
                ${details ? `<pre>${details}</pre>` : ''}
            `;
        }
        
        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.innerHTML = '<span>⏳ Signing in...</span>';
            resultEl.style.display = 'none';
            
            try {
                // Initialize Firebase
                const app = initializeApp({
                    apiKey: window.ENV.FIREBASE_API_KEY,
                    authDomain: window.ENV.FIREBASE_AUTH_DOMAIN,
                    projectId: window.ENV.FIREBASE_PROJECT_ID,
                    storageBucket: window.ENV.FIREBASE_STORAGE_BUCKET,
                    messagingSenderId: window.ENV.FIREBASE_MESSAGING_SENDER_ID,
                    appId: window.ENV.FIREBASE_APP_ID,
                    measurementId: window.ENV.FIREBASE_MEASUREMENT_ID
                });
                
                const auth = getAuth(app);
                const provider = new GoogleAuthProvider();
                provider.addScope('profile');
                provider.addScope('email');
                
                console.log('Attempting sign-in...');
                const result = await signInWithPopup(auth, provider);
                
                console.log('Success!', result);
                showResult(
                    'success',
                    '✅ Success!',
                    `Google Sign-In is working perfectly! Welcome, ${result.user.displayName || result.user.email}!`,
                    `User ID: ${result.user.uid}\nEmail: ${result.user.email}\nProvider: ${result.providerId || 'google.com'}`
                );
                
                btn.innerHTML = '<span>✅ Sign-In Successful!</span>';
                btn.style.background = '#28a745';
                
            } catch (error) {
                console.error('Error:', error);
                
                let errorTitle = '❌ Sign-In Failed';
                let errorMessage = error.message;
                let helpText = '';
                
                switch (error.code) {
                    case 'auth/popup-blocked':
                        errorMessage = 'Your browser blocked the sign-in popup.';
                        helpText = 'Please allow popups for this site in your browser settings.';
                        break;
                    case 'auth/popup-closed-by-user':
                        errorMessage = 'You closed the sign-in popup before completing.';
                        helpText = 'Please try again and complete the sign-in process.';
                        break;
                    case 'auth/unauthorized-domain':
                        errorMessage = `Your domain '${window.location.hostname}' is not authorized.`;
                        helpText = `Fix: Go to Firebase Console → Authentication → Settings → Add '${window.location.hostname}' to Authorized domains`;
                        break;
                    case 'auth/operation-not-allowed':
                        errorMessage = 'Google Sign-In is not enabled in Firebase.';
                        helpText = 'Fix: Go to Firebase Console → Authentication → Sign-in method → Enable Google';
                        break;
                    case 'auth/invalid-api-key':
                        errorMessage = 'Your Firebase API key is invalid.';
                        helpText = 'Fix: Check your Firebase configuration in js/firebase-config.js';
                        break;
                }
                
                showResult(
                    'error',
                    errorTitle,
                    errorMessage,
                    `Error Code: ${error.code}\n\n${helpText}\n\n📖 See GOOGLE_SIGNIN_FIX.md for detailed instructions.`
                );
                
                btn.disabled = false;
                btn.innerHTML = `
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    <span>Try Again</span>
                `;
            }
        });
    </script>
</body>
</html>
