<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Test - SutraKala</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <style>
    body {
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .test-section {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .test-header {
      background: #8E44AD;
      color: white;
      padding: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .status {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      font-size: 0.875rem;
      margin-left: 1rem;
    }
    .status.success { background: #28a745; color: white; }
    .status.error { background: #dc3545; color: white; }
    .status.loading { background: #ffc107; color: #000; }
    pre {
      background: #f5f5f5;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="test-header">
    <div>
      <h1 style="margin: 0;">🔐 SutraKala Auth System Test</h1>
    </div>
    <div id="authUIContainer" class="auth-ui-container"></div>
  </div>

  <div class="test-section">
    <h2>📊 System Status</h2>
    <div id="systemStatus">
      <p>🔄 Initializing...</p>
    </div>
  </div>

  <div class="test-section">
    <h2>🔍 Debug Info</h2>
    <div id="debugInfo">
      <p>Loading debug information...</p>
    </div>
  </div>

  <div class="test-section">
    <h2>👤 Current User</h2>
    <div id="userInfo">
      <p>No user logged in</p>
    </div>
  </div>

  <div class="test-section">
    <h2>📝 Console Logs</h2>
    <pre id="consoleLogs" style="max-height: 300px; overflow-y: auto;"></pre>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast" role="alert" aria-live="assertive" hidden>
    <i class="fas fa-check-circle" aria-hidden="true"></i>
    <span class="toast-message" id="toastMessage"></span>
  </div>

  <!-- Firebase Configuration -->
  <script src="js/firebase-config.js"></script>

  <script>
    // Capture console logs
    const logsContainer = document.getElementById('consoleLogs');
    const originalLog = console.log;
    const originalError = console.error;
    const originalWarn = console.warn;
    
    function addLog(type, ...args) {
      const timestamp = new Date().toLocaleTimeString();
      const message = args.map(arg => 
        typeof arg === 'object' ? JSON.stringify(arg, null, 2) : arg
      ).join(' ');
      
      const logLine = `[${timestamp}] [${type}] ${message}\n`;
      logsContainer.textContent += logLine;
      logsContainer.scrollTop = logsContainer.scrollHeight;
    }

    console.log = (...args) => {
      originalLog.apply(console, args);
      addLog('LOG', ...args);
    };

    console.error = (...args) => {
      originalError.apply(console, args);
      addLog('ERROR', ...args);
    };

    console.warn = (...args) => {
      originalWarn.apply(console, args);
      addLog('WARN', ...args);
    };
  </script>

  <!-- Firebase and Auth Scripts -->
  <script type="module" src="js/firebase-init.js"></script>
  <script type="module" src="js/auth-init.js"></script>

  <!-- Test Script -->
  <script type="module">
    import { authManager } from './js/core/auth-manager.js';

    // Wait for auth to initialize
    setTimeout(() => {
      const systemStatus = document.getElementById('systemStatus');
      const debugInfo = document.getElementById('debugInfo');
      const userInfo = document.getElementById('userInfo');

      // Check system status
      const checks = {
        'Firebase Initialized': window.authDebug !== undefined,
        'AuthManager Initialized': authManager.initialized,
        'Auth UI Container': document.getElementById('authUIContainer') !== null,
        'Login Modal Available': window.authDebug?.loginModal !== undefined
      };

      let statusHTML = '<ul>';
      for (const [check, passed] of Object.entries(checks)) {
        const statusClass = passed ? 'success' : 'error';
        const icon = passed ? '✅' : '❌';
        statusHTML += `<li>${icon} ${check} <span class="status ${statusClass}">${passed ? 'PASS' : 'FAIL'}</span></li>`;
      }
      statusHTML += '</ul>';
      systemStatus.innerHTML = statusHTML;

      // Show debug info
      if (window.authDebug) {
        debugInfo.innerHTML = `
          <pre>${JSON.stringify({
            authManagerInitialized: authManager.initialized,
            isAuthenticated: authManager.isAuthenticated(),
            isLoading: authManager.isLoading(),
            availableMethods: Object.keys(window.authDebug)
          }, null, 2)}</pre>
        `;
      }

      // Listen to auth changes
      authManager.on('stateChange', (state) => {
        if (state.user) {
          userInfo.innerHTML = `
            <h3>✅ Logged In</h3>
            <pre>${JSON.stringify({
              uid: state.user.uid,
              email: state.user.email,
              phoneNumber: state.user.phoneNumber,
              displayName: state.user.displayName,
              provider: state.user.providerData[0]?.providerId
            }, null, 2)}</pre>
          `;
        } else {
          userInfo.innerHTML = '<p>❌ No user logged in</p>';
        }
      });

    }, 2000);
  </script>
</body>
</html>
