<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godly Product Gallery | Crochet</title>
    <link rel="stylesheet" href="../css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Main Gallery Layout -->
    <div class="gallery-layout-container">
        
        <!-- Sidebar Filters -->
        <aside class="gallery-sidebar">
            <h2 class="sidebar-title">Filters</h2>
            
            <div class="filter-group">
                <h3>Categories</h3>
                <div class="filter-options" id="category-filters">
                    <label class="filter-checkbox"><input type="checkbox" value="all" checked> All</label>
                    <label class="filter-checkbox"><input type="checkbox" value="shawls"> Shawls</label>
                    <label class="filter-checkbox"><input type="checkbox" value="toys"> Amigurumi Toys</label>
                    <label class="filter-checkbox"><input type="checkbox" value="bags"> Totes & Bags</label>
                    <label class="filter-checkbox"><input type="checkbox" value="blankets"> Blankets</label>
                </div>
            </div>

            <div class="filter-group">
                <h3>Colors</h3>
                <div class="color-swatch-filters" id="color-filters">
                    <button class="color-filter-btn" data-color="lavender" style="background:#d8b4e2;" title="Lavender"></button>
                    <button class="color-filter-btn" data-color="sage" style="background:#9eb299;" title="Sage"></button>
                    <button class="color-filter-btn" data-color="mocha" style="background:#d4c5b9;" title="Mocha"></button>
                    <button class="color-filter-btn active" data-color="all" style="background:#fff; border: 1px solid #ccc;" title="All Colors">All</button>
                </div>
            </div>

            <div class="filter-group">
                <h3>Sort By</h3>
                <select id="sort-select" class="sort-dropdown">
                    <option value="popular">Most Popular</option>
                    <option value="new">New Arrivals</option>
                    <option value="price-low">Price: Low to High</option>
                </select>
            </div>

            <button class="clear-filters-btn" id="clear-filters">Clear All Filters</button>
        </aside>

        <!-- Main Content Area -->
        <main class="gallery-content">
            
            <!-- Active Filter Badges -->
            <div class="active-filters-bar" id="active-badges">
                <!-- Injected via JS -->
            </div>

            <!-- Masonry Grid -->
            <div class="masonry-grid" id="masonry-grid">
                <!-- Gallery Items Injected via JS -->
            </div>
            
            <!-- Loading Indicator -->
            <div class="loading-spinner" id="lazy-loader">
                <div class="spinner"></div>
            </div>

        </main>
    </div>

    <!-- Image Comparison Section (Before/After) -->
    <section class="image-comparison-wrapper">
        <h2 class="section-title">The Details Process</h2>
        <div class="comparison-slider" id="comparison-slider">
            <img src="assets/yarn-raw.jpg" alt="Raw Yarn" />
            <div class="resize-overlay">
                <img src="assets/yarn-finished.jpg" alt="Finished Crochet" />
            </div>
            <div class="slider-handle">↔</div>
        </div>
    </section>

    <!-- User Generated Content (UGC) Section -->
    <section class="ugc-section">
        <div class="ugc-header">
            <h2>Community Creations</h2>
            <p>Tag us <a href="#">@craftedloop</a> to be featured!</p>
        </div>
        <div class="ugc-grid" id="ugc-grid">
            <!-- Simulated IG Feeds injected -->
        </div>
        <button class="submit-photo-btn">Submit Your Photo</button>
    </section>

    <!-- Fullscreen Lightbox Modal -->
    <div class="lightbox-overlay" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <button class="lightbox-nav prev" id="lightbox-prev">&#10094;</button>
        <button class="lightbox-nav next" id="lightbox-next">&#10095;</button>
        
        <div class="lightbox-content-wrapper">
            <img src="" alt="Zoomed Product" class="lightbox-main-img" id="lightbox-img">
        </div>

        <div class="lightbox-thumbnails" id="lightbox-thumbnails">
            <!-- Injected Strip -->
        </div>
    </div>

    <!-- Scripts -->
    <!-- Assuming anime.js is globally available via CDN in real context -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script type="module" src="../js/main.js"></script>
</body>
</html>
