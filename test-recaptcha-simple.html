<!DOCTYPE html>
<html>
<head>
  <title>Simple reCAPTCHA Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    .status {
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    button {
      background: #8E44AD;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>🔐 Simple reCAPTCHA Test</h1>
  <div id="status" class="status">Initializing...</div>
  <button id="testBtn" disabled>Test reCAPTCHA</button>
  <div id="recaptcha-container"></div>

  <script src="js/firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, RecaptchaVerifier } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    
    const statusDiv = document.getElementById('status');
    const testBtn = document.getElementById('testBtn');
    
    async function init() {
      try {
        statusDiv.textContent = 'Step 1: Initializing Firebase...';
        
        const config = {
          apiKey: window.ENV.FIREBASE_API_KEY,
          authDomain: window.ENV.FIREBASE_AUTH_DOMAIN,
          projectId: window.ENV.FIREBASE_PROJECT_ID,
          storageBucket: window.ENV.FIREBASE_STORAGE_BUCKET,
          messagingSenderId: window.ENV.FIREBASE_MESSAGING_SENDER_ID,
          appId: window.ENV.FIREBASE_APP_ID
        };
        
        const app = initializeApp(config);
        const auth = getAuth(app);
        
        statusDiv.textContent = 'Step 2: Firebase initialized. Waiting for auth to be ready...';
        console.log('Auth object:', auth);
        console.log('Auth.settings:', auth.settings);
        
        // Wait for auth to be fully ready
        await new Promise(resolve => setTimeout(resolve, 500));
        
        statusDiv.textContent = 'Step 3: Creating RecaptchaVerifier...';
        console.log('Creating RecaptchaVerifier...');
        
        const recaptchaVerifier = new RecaptchaVerifier('recaptcha-container', {
          size: 'invisible',
          callback: (response) => {
            console.log('reCAPTCHA solved:', response);
          }
        }, auth);
        
        statusDiv.textContent = 'Step 4: Rendering reCAPTCHA...';
        await recaptchaVerifier.render();
        
        statusDiv.className = 'status success';
        statusDiv.textContent = '✅ SUCCESS! reCAPTCHA initialized successfully';
        testBtn.disabled = false;
        
        window.recaptchaVerifier = recaptchaVerifier;
        
      } catch (error) {
        statusDiv.className = 'status error';
        statusDiv.textContent = '❌ ERROR: ' + error.message;
        console.error('Full error:', error);
        console.error('Error stack:', error.stack);
      }
    }
    
    testBtn.addEventListener('click', () => {
      alert('reCAPTCHA is ready! You can now send OTP.');
    });
    
    init();
  </script>
</body>
</html>
