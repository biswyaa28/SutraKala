<!DOCTYPE html>
<html>
<head>
    <title>Integration Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #00ff00; }
        .pass { color: #00ff00; }
        .fail { color: #ff0000; }
        .test { margin: 10px 0; padding: 10px; background: #2d2d2d; }
    </style>
</head>
<body>
    <h1>🧪 Integration Test Results</h1>
    <div id="results"></div>
    
    <script src="js/firebase-config.js"></script>
    <script type="module">
        const results = [];
        
        function addResult(name, passed, message) {
            results.push({ name, passed, message });
            render();
        }
        
        function render() {
            const container = document.getElementById('results');
            container.innerHTML = results.map(r => `
                <div class="test ${r.passed ? 'pass' : 'fail'}">
                    ${r.passed ? '✅' : '❌'} ${r.name}<br>
                    <small>${r.message}</small>
                </div>
            `).join('');
        }
        
        // Test 1: Firebase config loaded
        try {
            if (window.ENV && window.ENV.FIREBASE_API_KEY) {
                addResult('Firebase Config', true, `API Key: ${window.ENV.FIREBASE_API_KEY.substring(0, 20)}...`);
            } else {
                addResult('Firebase Config', false, 'window.ENV not found');
            }
        } catch (e) {
            addResult('Firebase Config', false, e.message);
        }
        
        // Test 2: Auth helpers module
        try {
            const { signInWithGoogle, checkGoogleRedirectResult } = await import('./js/core/auth-helpers.js');
            if (typeof signInWithGoogle === 'function' && typeof checkGoogleRedirectResult === 'function') {
                addResult('Auth Helpers', true, 'signInWithGoogle and checkGoogleRedirectResult loaded');
            } else {
                addResult('Auth Helpers', false, 'Functions not found');
            }
        } catch (e) {
            addResult('Auth Helpers', false, e.message);
        }
        
        // Test 3: Firebase SDK initialization
        try {
            const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js');
            const { getAuth } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');
            
            const app = initializeApp({
                apiKey: window.ENV.FIREBASE_API_KEY,
                authDomain: window.ENV.FIREBASE_AUTH_DOMAIN,
                projectId: window.ENV.FIREBASE_PROJECT_ID,
                storageBucket: window.ENV.FIREBASE_STORAGE_BUCKET,
                messagingSenderId: window.ENV.FIREBASE_MESSAGING_SENDER_ID,
                appId: window.ENV.FIREBASE_APP_ID
            });
            
            const auth = getAuth(app);
            addResult('Firebase SDK', true, `Initialized with project: ${window.ENV.FIREBASE_PROJECT_ID}`);
        } catch (e) {
            addResult('Firebase SDK', false, e.message);
        }
        
        // Test 4: Check redirect result function
        try {
            const { checkGoogleRedirectResult } = await import('./js/core/auth-helpers.js');
            const result = await checkGoogleRedirectResult();
            addResult('Redirect Check', true, result ? 'User returned from redirect' : 'No pending redirect (normal)');
        } catch (e) {
            addResult('Redirect Check', false, e.message);
        }
        
        // Test 5: Login page script exists
        try {
            const response = await fetch('js/features/auth/login-page.js');
            if (response.ok) {
                addResult('Login Page Script', true, 'File exists and accessible');
            } else {
                addResult('Login Page Script', false, `HTTP ${response.status}`);
            }
        } catch (e) {
            addResult('Login Page Script', false, e.message);
        }
        
        // Summary
        setTimeout(() => {
            const passed = results.filter(r => r.passed).length;
            const total = results.length;
            const allPassed = passed === total;
            
            const summary = document.createElement('div');
            summary.className = `test ${allPassed ? 'pass' : 'fail'}`;
            summary.innerHTML = `
                <h2>${allPassed ? '✅' : '⚠️'} Summary: ${passed}/${total} tests passed</h2>
                ${allPassed ? 
                    '<p>✅ All checks passed! The fix is properly integrated.</p>' : 
                    '<p>⚠️ Some issues detected. Review the errors above.</p>'
                }
            `;
            document.getElementById('results').appendChild(summary);
        }, 1000);
    </script>
</body>
</html>
